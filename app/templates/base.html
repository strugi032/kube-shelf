<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kubernetes Image Inventory{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">Kubernetes Image Inventory</a>
            <div class="nav-links">
                <a href="/refresh" class="btn btn-small">Refresh</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Kubernetes Image Inventory - Lightweight K8s Inventory</p>
        </div>
    </footer>
</body>
</html>
